<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro y Cuenta Regresiva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        .timer-container {
            display: flex;
            justify-content: space-around;
            width: 90%;
        }
        .timer {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .time {
            font-size: 40px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
        }
        .buttons button {
            margin: 0 5px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .start {
            background-color: #28a745;
            color: #fff;
        }
        .pause {
            background-color: #ffc107;
            color: #fff;
        }
        .reset {
            background-color: #dc3545;
            color: #fff;
        }
        .hidden {
            display: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
        }
        .modal-content input {
            margin-right: 5px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Cronómetro y Cuenta Regresiva</h1>

    <div class="timer-container">
        <!-- Cronómetro -->
        <div class="timer">
            <div id="stopwatch" class="time">00:00:00.000</div>
            <div class="buttons">
                <button id="startStopwatch" class="start">Iniciar</button>
                <button id="pauseStopwatch" class="pause hidden">Pausar</button>
                <button id="resetStopwatch" class="reset hidden">Limpiar</button>
            </div>
        </div>

        <!-- Cuenta regresiva -->
        <div class="timer">
            <div id="countdown" class="time">00:00:00</div>
            <div class="buttons">
                <button id="configCountdown" class="start">Configurar</button>
                <button id="startCountdown" class="start hidden">Iniciar</button>
                <button id="pauseCountdown" class="pause hidden">Pausar</button>
                <button id="resetCountdown" class="reset hidden">Limpiar</button>
            </div>
        </div>
    </div>

    <!-- Modal para configurar la cuenta regresiva -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <label for="hours">Horas:</label>
            <input type="number" id="hours" min="0" max="23" value="0">
            <label for="minutes">Minutos:</label>
            <input type="number" id="minutes" min="0" max="59" value="0">
            <label for="seconds">Segundos:</label>
            <input type="number" id="seconds" min="0" max="59" value="0">
            <button id="setCountdown" class="start">Establecer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
